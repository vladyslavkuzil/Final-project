x-api-base: &api-base
  build:
    context: ./backend
    dockerfile: Dockerfile
  entrypoint: ["sh", "/app/backend/entrypoint.sh"]
  env_file: .env
  environment:
    PYTHONPATH: /app/backend
  volumes:
    - ./backend:/app/backend
    - /app/backend/.venv

services:
  api:
    <<: *api-base
    profiles: [dev]
    container_name: project-dashboard-api
    command: ["uv", "run", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-test:
    <<: *api-base
    profiles: [test]
    container_name: project-dashboard-api-test
    command: ["uv", "run", "pytest", "tests/", "-v"]
    environment:
      PYTHONPATH: /app/backend
      DATABASE_URL: ${TEST_DATABASE_URL}
    depends_on:
      db-test:
        condition: service_healthy

  db:
    profiles: [dev]
    image: postgres:16-alpine
    container_name: project-dashboard-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-project_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-test:
    profiles: [test]
    image: postgres:16-alpine
    container_name: project-dashboard-db-test
    environment:
      POSTGRES_DB: ${TEST_POSTGRES_DB:-project_dashboard_test}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${TEST_POSTGRES_DB:-project_dashboard_test}"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    profiles: [dev]
    build:
      context: ./frontend
    container_name: project-dashboard-frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file: .env
    environment:
      NEXT_TELEMETRY_DISABLED: "1"

  redis:
    profiles: [dev]
    image: redis:7-alpine
    container_name: project-dashboard-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-password}"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  postgres_test_data:
  frontend_node_modules:
