services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project-dashboard-api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/backend/src
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: project-dashboard-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-project_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
